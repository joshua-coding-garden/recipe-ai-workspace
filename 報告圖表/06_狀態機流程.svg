<svg baseProfile="full" height="700" version="1.1" width="1000" xmlns="http://www.w3.org/2000/svg" xmlns:ev="http://www.w3.org/2001/xml-events" xmlns:xlink="http://www.w3.org/1999/xlink"><defs><marker id="arr06" markerHeight="10" markerWidth="10" orient="auto" refX="10" refY="5"><polygon fill="#2C3E50" points="0,0 10,5 0,10" /></marker></defs><rect fill="#FFFFFF" height="700" rx="8" width="1000" x="0" y="0" /><text dominant-baseline="central" fill="#2C3E50" font-family="&quot;Microsoft JhengHei&quot;, &quot;PingFang TC&quot;, &quot;Noto Sans TC&quot;, sans-serif" font-size="22" font-weight="bold" text-anchor="middle" x="500" y="35">工作流程狀態機 — WorkflowState</text><rect fill="#95A5A6" height="80" rx="10" ry="10" width="320" x="340" y="90" /><text dominant-baseline="central" fill="#FFF" font-family="&quot;Microsoft JhengHei&quot;, &quot;PingFang TC&quot;, &quot;Noto Sans TC&quot;, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" x="500" y="118">閒置（idle）</text><text dominant-baseline="central" fill="#FFF" font-family="&quot;Microsoft JhengHei&quot;, &quot;PingFang TC&quot;, &quot;Noto Sans TC&quot;, sans-serif" font-size="12" text-anchor="middle" x="500" y="145">等待使用者輸入</text><rect fill="#3498DB" height="80" rx="10" ry="10" width="320" x="340" y="200" /><text dominant-baseline="central" fill="#FFF" font-family="&quot;Microsoft JhengHei&quot;, &quot;PingFang TC&quot;, &quot;Noto Sans TC&quot;, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" x="500" y="228">收集參數（collecting）</text><text dominant-baseline="central" fill="#FFF" font-family="&quot;Microsoft JhengHei&quot;, &quot;PingFang TC&quot;, &quot;Noto Sans TC&quot;, sans-serif" font-size="12" text-anchor="middle" x="500" y="255">缺少必要參數，追問使用者</text><rect fill="#2ECC71" height="80" rx="10" ry="10" width="320" x="340" y="310" /><text dominant-baseline="central" fill="#FFF" font-family="&quot;Microsoft JhengHei&quot;, &quot;PingFang TC&quot;, &quot;Noto Sans TC&quot;, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" x="500" y="338">參數齊全（ready）</text><text dominant-baseline="central" fill="#FFF" font-family="&quot;Microsoft JhengHei&quot;, &quot;PingFang TC&quot;, &quot;Noto Sans TC&quot;, sans-serif" font-size="12" text-anchor="middle" x="500" y="365">參數已齊，準備執行工具</text><rect fill="#F39C12" height="80" rx="10" ry="10" width="320" x="340" y="420" /><text dominant-baseline="central" fill="#FFF" font-family="&quot;Microsoft JhengHei&quot;, &quot;PingFang TC&quot;, &quot;Noto Sans TC&quot;, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" x="500" y="448">執行中（executing）</text><text dominant-baseline="central" fill="#FFF" font-family="&quot;Microsoft JhengHei&quot;, &quot;PingFang TC&quot;, &quot;Noto Sans TC&quot;, sans-serif" font-size="12" text-anchor="middle" x="500" y="475">呼叫後端 API 取得結果</text><rect fill="#1ABC9C" height="80" rx="10" ry="10" width="320" x="340" y="530" /><text dominant-baseline="central" fill="#FFF" font-family="&quot;Microsoft JhengHei&quot;, &quot;PingFang TC&quot;, &quot;Noto Sans TC&quot;, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" x="500" y="558">完成（done）</text><text dominant-baseline="central" fill="#FFF" font-family="&quot;Microsoft JhengHei&quot;, &quot;PingFang TC&quot;, &quot;Noto Sans TC&quot;, sans-serif" font-size="12" text-anchor="middle" x="500" y="585">工具執行完畢，進入分析</text><path d="M335,130 L280,130 L280,240 L335,240" fill="none" marker-end="url(#arr06)" stroke="#95A5A6" stroke-width="2" /><text dominant-baseline="central" fill="#555" font-family="&quot;Microsoft JhengHei&quot;, &quot;PingFang TC&quot;, &quot;Noto Sans TC&quot;, sans-serif" font-size="11" text-anchor="end" x="272" y="177">意圖需要參數</text><text dominant-baseline="central" fill="#555" font-family="&quot;Microsoft JhengHei&quot;, &quot;PingFang TC&quot;, &quot;Noto Sans TC&quot;, sans-serif" font-size="11" text-anchor="end" x="272" y="193">（如 query_dri 需年齡）</text><path d="M665,130 L700,130 L700,350 L665,350" fill="none" marker-end="url(#arr06)" stroke="#95A5A6" stroke-width="2" /><text dominant-baseline="central" fill="#555" font-family="&quot;Microsoft JhengHei&quot;, &quot;PingFang TC&quot;, &quot;Noto Sans TC&quot;, sans-serif" font-size="11" text-anchor="start" x="708" y="240">參數已齊全</text><path d="M335,240 C255,190 255,290 335,245" fill="none" marker-end="url(#arr06)" stroke="#3498DB" stroke-width="2" /><text dominant-baseline="central" fill="#555" font-family="&quot;Microsoft JhengHei&quot;, &quot;PingFang TC&quot;, &quot;Noto Sans TC&quot;, sans-serif" font-size="11" text-anchor="middle" x="235" y="230">繼續追問</text><text dominant-baseline="central" fill="#555" font-family="&quot;Microsoft JhengHei&quot;, &quot;PingFang TC&quot;, &quot;Noto Sans TC&quot;, sans-serif" font-size="11" text-anchor="middle" x="235" y="246">（最多 3 輪）</text><line marker-end="url(#arr06)" stroke="#2C3E50" stroke-width="2" x1="500" x2="500" y1="282" y2="308" /><text dominant-baseline="central" fill="#555" font-family="&quot;Microsoft JhengHei&quot;, &quot;PingFang TC&quot;, &quot;Noto Sans TC&quot;, sans-serif" font-size="11" text-anchor="start" x="515" y="289">參數收集完成</text><line marker-end="url(#arr06)" stroke="#2C3E50" stroke-width="2" x1="500" x2="500" y1="392" y2="418" /><text dominant-baseline="central" fill="#555" font-family="&quot;Microsoft JhengHei&quot;, &quot;PingFang TC&quot;, &quot;Noto Sans TC&quot;, sans-serif" font-size="11" text-anchor="start" x="515" y="399">呼叫 _execute_tool()</text><line marker-end="url(#arr06)" stroke="#2C3E50" stroke-width="2" x1="500" x2="500" y1="502" y2="528" /><text dominant-baseline="central" fill="#555" font-family="&quot;Microsoft JhengHei&quot;, &quot;PingFang TC&quot;, &quot;Noto Sans TC&quot;, sans-serif" font-size="11" text-anchor="start" x="515" y="509">工具回傳結果</text><path d="M665,570 L740,570 L740,130 L665,130" fill="none" marker-end="url(#arr06)" stroke="#1ABC9C" stroke-width="2" /><text dominant-baseline="central" fill="#555" font-family="&quot;Microsoft JhengHei&quot;, &quot;PingFang TC&quot;, &quot;Noto Sans TC&quot;, sans-serif" font-size="11" text-anchor="start" x="748" y="342">回到閒置</text><text dominant-baseline="central" fill="#555" font-family="&quot;Microsoft JhengHei&quot;, &quot;PingFang TC&quot;, &quot;Noto Sans TC&quot;, sans-serif" font-size="11" text-anchor="start" x="748" y="358">（或處理下一個意圖）</text><text dominant-baseline="central" fill="#888" font-family="&quot;Microsoft JhengHei&quot;, &quot;PingFang TC&quot;, &quot;Noto Sans TC&quot;, sans-serif" font-size="12" text-anchor="middle" x="500" y="670">※ _detect_interruption()：使用者中途換話題 → 強制 reset 為 idle</text></svg>