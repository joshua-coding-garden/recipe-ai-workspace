ral" fill="#555" font-family="&quot;Microsoft JhengHei&quot;, &quot;PingFang TC&quot;, &quot;Noto Sans TC&quot;, sans-serif" font-size="13" font-weight="normal" text-anchor="start" x="230.0" y="610">temp=0.3 · max_tokens=2048 · 2次呼叫</text><text dominant-baseline="central" fill="#777" font-family="&quot;Microsoft JhengHei&quot;, &quot;PingFang TC&quot;, &quot;Noto Sans TC&quot;, sans-serif" font-size="12" font-weight="normal" text-anchor="start" x="230.0" y="638">前台：SSE analysis_chunk（串流）　｜　後台：綜合分析 + 建議</text><rect fill="#FFFFFF" fill-opacity="1.0" height="340" rx="8" ry="8" stroke="#9B59B6" stroke-width="1.5" width="140" x="850" y="200" /><rect fill="#9B59B6" fill-opacity="1.0" height="8" rx="8" ry="8" stroke="none" stroke-width="1.5" width="140" x="850" y="200" /><text dominant-baseline="central" fill="#9B59B6" font-family="&quot;Microsoft JhengHei&quot;, &quot;PingFang TC&quot;, &quot;Noto Sans TC&quot;, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" x="920.0" y="235">Memory</text><text dominant-baseline="central" fill="#9B59B6" font-family="&quot;Microsoft JhengHei&quot;, &quot;PingFang TC&quot;, &quot;Noto Sans TC&quot;, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" x="920.0" y="255">Compression</text><text dominant-baseline="central" fill="#555" font-family="&quot;Microsoft JhengHei&quot;, &quot;PingFang TC&quot;, &quot;Noto Sans TC&quot;, sans-serif" font-size="11" font-weight="normal" text-anchor="middle" x="920.0" y="290">temp=0.2</text><text dominant-baseline="central" fill="#555" font-family="&quot;Microsoft JhengHei&quot;, &quot;PingFang TC&quot;, &quot;Noto Sans TC&quot;, sans-serif" font-size="11" font-weight="normal" text-anchor="middle" x="920.0" y="310">max_tokens</text><text dominant-baseline="central" fill="#555" font-family="&quot;Microsoft JhengHei&quot;, &quot;PingFang TC&quot;, &quot;Noto Sans TC&quot;, sans-serif" font-size="11" font-weight="normal" text-anchor="middle" x="920.0" y="330">=1024</text><te