<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="1000" viewBox="0 0 1100 1000">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arr-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1565C0"/>
    </marker>
    <marker id="arr-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2E7D32"/>
    </marker>
    <marker id="arr-purple" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6A1B9A"/>
    </marker>
    <marker id="arr-red" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#C62828"/>
    </marker>
    <marker id="arr-amber" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#F57F17"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="1000" fill="white"/>

  <!-- Title -->
  <text x="550" y="35" text-anchor="middle" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="20" font-weight="bold" fill="#333">營養素排名流程 Nutrient Ranking Sequence Diagram</text>

  <!-- ===== PARTICIPANT HEADERS ===== -->
  <!-- User -->
  <rect x="30" y="55" width="90" height="40" rx="6" fill="#FFE0B2" stroke="#E65100" stroke-width="1.5"/>
  <text x="75" y="80" text-anchor="middle" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="13" font-weight="bold" fill="#333">使用者</text>

  <!-- NutrientRankingPage -->
  <rect x="170" y="55" width="150" height="40" rx="6" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.5"/>
  <text x="245" y="73" text-anchor="middle" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="11" font-weight="bold" fill="#333">NutrientRanking</text>
  <text x="245" y="87" text-anchor="middle" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="11" font-weight="bold" fill="#333">Page.jsx</text>

  <!-- Control -->
  <rect x="370" y="55" width="120" height="40" rx="6" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="430" y="73" text-anchor="middle" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="12" font-weight="bold" fill="#333">Control</text>
  <text x="430" y="87" text-anchor="middle" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="11" fill="#555">(:8000)</text>

  <!-- Backend -->
  <rect x="540" y="55" width="110" height="40" rx="6" fill="#F3E5F5" stroke="#6A1B9A" stroke-width="1.5"/>
  <text x="595" y="73" text-anchor="middle" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="12" font-weight="bold" fill="#333">Backend</text>
  <text x="595" y="87" text-anchor="middle" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="11" fill="#555">(:8001)</text>

  <!-- PostgreSQL -->
  <rect x="700" y="55" width="100" height="40" rx="6" fill="#FFCDD2" stroke="#C62828" stroke-width="1.5"/>
  <text x="750" y="80" text-anchor="middle" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="12" font-weight="bold" fill="#333">PostgreSQL</text>

  <!-- ===== LIFELINES ===== -->
  <line x1="75" y1="95" x2="75" y2="990" stroke="#999" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="245" y1="95" x2="245" y2="990" stroke="#999" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="430" y1="95" x2="430" y2="990" stroke="#999" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="595" y1="95" x2="595" y2="990" stroke="#999" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="750" y1="95" x2="750" y2="990" stroke="#999" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- ===== STEP 1: User selection ===== -->
  <rect x="20" y="110" width="20" height="22" fill="#FFE0B2" stroke="#E65100" stroke-width="1"/>
  <text x="50" y="125" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="11" fill="#333" font-weight="bold">1</text>

  <rect x="60" y="106" width="245" height="72" rx="5" fill="#FFF3E0" stroke="#E65100" stroke-width="1"/>
  <text x="182" y="124" text-anchor="middle" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="10.5" fill="#E65100" font-weight="bold">選擇分組 → 選擇營養素 → Top N</text>
  <text x="70" y="140" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="9.5" fill="#555">分組: "礦物質"</text>
  <text x="70" y="154" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="9.5" fill="#555">營養素: "鈣 (calcium_per_100g)"</text>
  <text x="70" y="168" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="9.5" fill="#555">Top N: 10</text>

  <!-- 13 groups annotation -->
  <rect x="20" y="185" width="290" height="42" rx="4" fill="#F5F5F5" stroke="#BDBDBD" stroke-width="1"/>
  <text x="30" y="200" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="9" fill="#666" font-weight="bold">13 分組 (nutrientRankingFields.js, 110+ 欄):</text>
  <text x="30" y="214" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="8.5" fill="#888">基本/糖類/礦物質/維A/D/E/K/B群/SFA/MUFA/PUFA/胺基酸/其他</text>

  <!-- ===== STEP 2: Frontend → Control ===== -->
  <line x1="245" y1="245" x2="420" y2="245" stroke="#1565C0" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <text x="332" y="240" text-anchor="middle" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="10" fill="#1565C0" font-weight="bold">2</text>
  <text x="332" y="260" text-anchor="middle" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="9" fill="#1565C0">GET /api/health/nutrients/calcium_per_100g/</text>
  <text x="332" y="272" text-anchor="middle" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="9" fill="#1565C0">top-foods?limit=10</text>

  <!-- ===== STEP 3: Control → Backend ===== -->
  <line x1="430" y1="288" x2="585" y2="288" stroke="#2E7D32" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text x="507" y="283" text-anchor="middle" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="10" fill="#2E7D32" font-weight="bold">3</text>
  <text x="507" y="303" text-anchor="middle" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="9" fill="#2E7D32">GET /health/nutrients/calcium_per_100g/top-foods?limit=10</text>

  <!-- ===== STEP 4: Backend lookup ===== -->
  <rect x="550" y="318" width="135" height="38" rx="4" fill="#F3E5F5" stroke="#6A1B9A" stroke-width="1"/>
  <text x="617" y="334" text-anchor="middle" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="10" fill="#6A1B9A" font-weight="bold">4 查 nutrient_field_map.json</text>
  <text x="617" y="349" text-anchor="middle" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="9" fill="#555">→ taiwan_col: "calcium_per_100g"</text>

  <!-- ===== STEP 5: Backend → PostgreSQL ===== -->
  <line x1="595" y1="370" x2="740" y2="370" stroke="#C62828" stroke-width="1.5" marker-end="url(#arr-red)"/>
  <text x="667" y="365" text-anchor="middle" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="10" fill="#C62828" font-weight="bold">5</text>
  <rect x="610" y="378" width="200" height="46" rx="4" fill="#FFF" stroke="#C62828" stroke-width="1"/>
  <text x="710" y="394" text-anchor="middle" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="8.5" fill="#555">SELECT food_name, calcium_per_100g,</text>
  <text x="710" y="407" text-anchor="middle" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="8.5" fill="#555">source FROM taiwan_foods</text>
  <text x="710" y="420" text-anchor="middle" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="8.5" fill="#555">ORDER BY calcium_per_100g DESC LIMIT 10</text>

  <!-- ===== STEP 6: PostgreSQL → Backend ===== -->
  <line x1="740" y1="440" x2="605" y2="440" stroke="#C62828" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-red)"/>
  <text x="672" y="435" text-anchor="middle" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="10" fill="#C62828" font-weight="bold">6</text>
  <text x="672" y="455" text-anchor="middle" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="9" fill="#C62828">[{food_name:"小魚乾", calcium:2213, ...}]</text>

  <!-- ===== STEP 7: Backend → Control → Frontend ===== -->
  <line x1="585" y1="475" x2="255" y2="475" stroke="#6A1B9A" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-purple)"/>
  <text x="420" y="470" text-anchor="middle" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="10" fill="#6A1B9A" font-weight="bold">7</text>
  <text x="420" y="490" text-anchor="middle" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="9.5" fill="#6A1B9A">Backend → Control → Frontend: JSON array</text>

  <!-- ===== STEP 8: Render table ===== -->
  <line x1="245" y1="508" x2="85" y2="508" stroke="#E65100" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-amber)"/>
  <text x="165" y="503" text-anchor="middle" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="10" fill="#E65100" font-weight="bold">8</text>
  <rect x="20" y="518" width="210" height="32" rx="5" fill="#FFF8E1" stroke="#F57F17" stroke-width="1.5"/>
  <text x="125" y="539" text-anchor="middle" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="10" fill="#E65100">渲染排名表格 (排名/食物名/含量/來源)</text>

  <!-- ===== STEP 9: User clicks food ===== -->
  <rect x="20" y="565" width="20" height="22" fill="#FFE0B2" stroke="#E65100" stroke-width="1"/>
  <text x="50" y="580" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="11" fill="#333" font-weight="bold">9</text>
  <rect x="60" y="563" width="150" height="26" rx="4" fill="#FFF3E0" stroke="#E65100" stroke-width="1"/>
  <text x="135" y="580" text-anchor="middle" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="10.5" fill="#E65100">點擊 "小魚乾"</text>

  <!-- ===== STEP 10: Source routing ===== -->
  <rect x="170" y="600" width="210" height="88" rx="6" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.5"/>
  <text x="275" y="618" text-anchor="middle" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="10" font-weight="bold" fill="#1565C0">10 依 source 分流</text>

  <!-- Taiwan route -->
  <rect x="180" y="627" width="190" height="24" rx="3" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1"/>
  <text x="275" y="644" text-anchor="middle" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="9.5" fill="#2E7D32">source=="taiwan_foods" → TaiwanFoodModal</text>

  <!-- FooDB route -->
  <rect x="180" y="656" width="190" height="24" rx="3" fill="#F3E5F5" stroke="#6A1B9A" stroke-width="1"/>
  <text x="275" y="673" text-anchor="middle" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="9.5" fill="#6A1B9A">source=="foodb" → FoodbFoodModal</text>

  <!-- Taiwan path arrows -->
  <line x1="275" y1="639" x2="420" y2="639" stroke="#2E7D32" stroke-width="1" marker-end="url(#arr-green)"/>
  <text x="348" y="634" text-anchor="middle" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="8.5" fill="#2E7D32">GET /api/food/taiwan/{id}</text>

  <line x1="275" y1="668" x2="420" y2="668" stroke="#6A1B9A" stroke-width="1" marker-end="url(#arr-purple)"/>
  <text x="348" y="684" text-anchor="middle" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="8.5" fill="#6A1B9A">GET /api/food/foodb/{id}</text>

  <!-- ===== STEP 11: Modal result ===== -->
  <line x1="245" y1="705" x2="85" y2="705" stroke="#E65100" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-amber)"/>
  <text x="165" y="700" text-anchor="middle" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="10" fill="#E65100" font-weight="bold">11</text>
  <rect x="20" y="715" width="245" height="32" rx="5" fill="#FFF8E1" stroke="#F57F17" stroke-width="1.5"/>
  <text x="142" y="735" text-anchor="middle" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="10" fill="#E65100">Modal: 4 標籤 (維生素/礦物質/糖類/脂肪酸)</text>

  <!-- ====================================================================== -->
  <!-- SPECIAL CASE: Composite fields annotation -->
  <!-- ====================================================================== -->
  <rect x="480" y="505" width="330" height="140" rx="8" fill="#FFF3E0" stroke="#E65100" stroke-width="2"/>
  <text x="645" y="526" text-anchor="middle" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="12" font-weight="bold" fill="#E65100">SPECIAL CASE: 合計欄位</text>

  <text x="495" y="548" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="10" font-weight="bold" fill="#555">vitamin_k_ug =</text>
  <text x="495" y="562" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="9.5" fill="#888">  k1 + k2mk4 + k2mk7 (三欄合計)</text>

  <text x="495" y="582" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="10" font-weight="bold" fill="#555">n3_pufa_total_mg =</text>
  <text x="495" y="596" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="9.5" fill="#888">  ALA + EPA + DHA (三欄合計)</text>

  <text x="495" y="618" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="10" font-weight="bold" fill="#555">SQL:</text>
  <text x="495" y="632" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="9" fill="#6A1B9A">COALESCE(k1,0)+COALESCE(k2mk4,0)+COALESCE(k2mk7,0)</text>

  <text x="495" y="640" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="9" fill="#888">nutrient_field_map.json 用 "taiwan_cols": [...] 聲明</text>

  <!-- ====================================================================== -->
  <!-- AI Advisor Alternative Path (right side) -->
  <!-- ====================================================================== -->
  <rect x="870" y="55" width="100" height="40" rx="6" fill="#FFF9C4" stroke="#F57F17" stroke-width="1.5"/>
  <text x="920" y="73" text-anchor="middle" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="11" font-weight="bold" fill="#333">AdvisorPage</text>
  <text x="920" y="87" text-anchor="middle" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="10" fill="#888">(LLM)</text>

  <!-- Advisor lifeline -->
  <line x1="920" y1="95" x2="920" y2="500" stroke="#F57F17" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Divider -->
  <line x1="830" y1="100" x2="830" y2="500" stroke="#E0E0E0" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="837" y="118" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="10" fill="#999" writing-mode="tb">替代路徑</text>

  <!-- AI Advisor Box -->
  <rect x="848" y="140" width="240" height="200" rx="8" fill="#FFFDE7" stroke="#F57F17" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="968" y="162" text-anchor="middle" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="11" font-weight="bold" fill="#F57F17">AI Advisor 路徑</text>

  <!-- User query -->
  <text x="860" y="185" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="10" fill="#555">使用者:</text>
  <text x="860" y="199" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="10" fill="#E65100">"鈣含量最高的食物"</text>

  <!-- Intent -->
  <rect x="858" y="212" width="220" height="40" rx="4" fill="#FFF9C4" stroke="#F57F17" stroke-width="1"/>
  <text x="968" y="229" text-anchor="middle" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="9.5" font-weight="bold" fill="#F57F17">PROMPT_PHASE1 (LLM)</text>
  <text x="968" y="244" text-anchor="middle" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="9" fill="#555">intent: "nutrient_ranking"</text>

  <!-- Tool call -->
  <rect x="858" y="260" width="220" height="35" rx="4" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1"/>
  <text x="968" y="277" text-anchor="middle" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="9.5" font-weight="bold" fill="#2E7D32">get_nutrient_ranking()</text>
  <text x="968" y="290" text-anchor="middle" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="9" fill="#555">→ same backend (steps 3-7)</text>

  <!-- Arrow to backend -->
  <line x1="858" y1="280" x2="605" y2="280" stroke="#2E7D32" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arr-green)"/>

  <!-- LLM response -->
  <rect x="858" y="303" width="220" height="28" rx="4" fill="#FFF9C4" stroke="#F57F17" stroke-width="1"/>
  <text x="968" y="321" text-anchor="middle" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="9" fill="#555">PROMPT_ANALYSIS → 排名結果 + 說明</text>

  <!-- ====================================================================== -->
  <!-- LEGEND -->
  <!-- ====================================================================== -->
  <rect x="20" y="768" width="790" height="120" rx="8" fill="#FAFAFA" stroke="#DDD" stroke-width="1"/>
  <text x="40" y="793" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="14" font-weight="bold" fill="#333">圖例 Legend</text>

  <!-- Color legend row 1 -->
  <rect x="40" y="808" width="16" height="16" rx="3" fill="#FFE0B2" stroke="#E65100" stroke-width="1"/>
  <text x="62" y="821" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="11" fill="#555">使用者操作</text>

  <rect x="170" y="808" width="16" height="16" rx="3" fill="#E3F2FD" stroke="#1565C0" stroke-width="1"/>
  <text x="192" y="821" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="11" fill="#555">Frontend</text>

  <rect x="290" y="808" width="16" height="16" rx="3" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1"/>
  <text x="312" y="821" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="11" fill="#555">Control (:8000)</text>

  <rect x="430" y="808" width="16" height="16" rx="3" fill="#F3E5F5" stroke="#6A1B9A" stroke-width="1"/>
  <text x="452" y="821" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="11" fill="#555">Backend (:8001)</text>

  <rect x="580" y="808" width="16" height="16" rx="3" fill="#FFCDD2" stroke="#C62828" stroke-width="1"/>
  <text x="602" y="821" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="11" fill="#555">PostgreSQL</text>

  <rect x="700" y="808" width="16" height="16" rx="3" fill="#FFF9C4" stroke="#F57F17" stroke-width="1"/>
  <text x="722" y="821" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="11" fill="#555">LLM</text>

  <!-- Arrow legend -->
  <line x1="40" y1="845" x2="90" y2="845" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="100" y="849" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="11" fill="#555">請求 Request</text>

  <line x1="220" y1="845" x2="270" y2="845" stroke="#555" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="280" y="849" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="11" fill="#555">回應 Response</text>

  <!-- Data source note -->
  <rect x="40" y="860" width="750" height="20" rx="3" fill="#FFF" stroke="#BDBDBD" stroke-width="1"/>
  <text x="50" y="875" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="10" fill="#888">資料來源: taiwan_foods (2,213 筆, 2024 UPDATE2) | nutrient_field_map.json (106 keys) | nutrientRankingFields.js (110+ 欄, 13 組)</text>

  <!-- Modal routing note at bottom -->
  <rect x="20" y="900" width="790" height="45" rx="6" fill="#F5F5F5" stroke="#BDBDBD" stroke-width="1"/>
  <text x="40" y="920" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="10" font-weight="bold" fill="#333">Modal 分流邏輯 (NutrientRankingPage.jsx):</text>
  <text x="40" y="936" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="9.5" fill="#555">source=="taiwan_foods" → GET /api/food/taiwan/{id} → TaiwanFoodModal | source=="foodb" → GET /api/food/foodb/{id} → FoodbFoodModal</text>
</svg>