  <rect x="440" y="768" width="65" height="20" rx="4" fill="#E74C3C" />
  <text x="472" y="782" text-anchor="middle" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="10" font-weight="bold" fill="white">temp=0.0</text>
  <text x="100" y="797" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="11" fill="#555">Position: advisor.py → _extract_params_llm() → _call_gemma()</text>
  <text x="100" y="814" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="11" fill="#C0392B">ONLY if parameter collection needed — Fallback 路徑</text>

  <line x1="890" y1="785" x2="918" y2="87" stroke="#E74C3C" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowhead-red)" />

