  <text x="460" y="905" text-anchor="middle" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="12" font-weight="bold" fill="#D35400">gemma_*_service.py (control)</text>
  <text x="460" y="920" text-anchor="middle" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="10" fill="#888">Steps 4a, 4b</text>

  <!-- Arrow -->
  <line x1="590" y1="905" x2="635" y2="905" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)" />

  <!-- api_server.py -->
  <rect x="645" y="885" width="220" height="40" rx="6" fill="#FDEBD0" stroke="#E67E22" stroke-width="1.5" />
  <text x="755" y="905" text-anchor="middle" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="12" font-weight="bold" fill="#D35400">api_server.py (graph/)</text>
  <text x="755" y="920" text-anchor="middle" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="10" fill="#888">Step 4c</text>

