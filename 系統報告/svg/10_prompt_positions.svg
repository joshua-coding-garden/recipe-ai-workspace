  <text x="60" y="323" text-anchor="middle" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="13" font-weight="bold" fill="white">3</text>

  <rect x="90" y="298" width="800" height="58" rx="8" fill="#D6EAF8" stroke="#4A90D9" stroke-width="2" filter="url(#shadow)" />
