  <rect x="40" y="78" width="14" height="14" rx="3" fill="#D6EAF8" stroke="#4A90D9" stroke-width="1.5" />
  <text x="60" y="90" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="11" fill="#555">Main Pipeline</text>
  <rect x="155" y="78" width="14" height="14" rx="3" fill="#D5F5E3" stroke="#27AE60" stroke-width="1.5" />
  <text x="175" y="90" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="11" fill="#555">Memory</text>
  <rect x="240" y="78" width="14" height="14" rx="3" fill="#FDEBD0" stroke="#E67E22" stroke-width="1.5" />
  <text x="260" y="90" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="11" fill="#555">Tool Sub-prompts</text>
  <rect x="380" y="78" width="14" height="14" rx="3" fill="#FADBD8" stroke="#E74C3C" stroke-width="1.5" />
  <text x="400" y="90" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="11" fill="#555">Fallback</text>

  <!-- Right side: LLM target column header -->
