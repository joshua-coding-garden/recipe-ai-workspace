  <text x="1035" y="905" text-anchor="middle" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="14" font-weight="bold" fill="white">Gemma-2-27B</text>
  <text x="1035" y="922" text-anchor="middle" font-family="monospace" font-size="11" fill="#BDC3C7">llama-server :8080</text>

  <!-- Note about all arrows going to same LLM -->
  <text x="600" y="960" text-anchor="middle" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="12" fill="#999">All prompts target the same local Gemma-2-27B instance via llama-server HTTP API on port 8080</text>
  <text x="600" y="978" text-anchor="middle" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="11" fill="#BBB">Steps 6a/6b run in parallel (asyncio.gather); Step 7 only fires when parameter collection is needed</text>
