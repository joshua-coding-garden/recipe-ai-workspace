  <text x="60" y="705" text-anchor="middle" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="13" font-weight="bold" fill="white">6</text>

  <!-- 6a -->
  <rect x="90" y="668" width="390" height="58" rx="8" fill="#D5F5E3" stroke="#27AE60" stroke-width="2" filter="url(#shadow)" />
