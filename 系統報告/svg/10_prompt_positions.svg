  <!-- advisor.py -->
  <rect x="55" y="885" width="220" height="40" rx="6" fill="#D6EAF8" stroke="#4A90D9" stroke-width="1.5" />
  <text x="165" y="905" text-anchor="middle" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="12" font-weight="bold" fill="#2C6FAC">advisor.py (control)</text>
