  <text x="120" y="440" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="10" fill="#888">IF analyze_recipe → recipe.py → extract-with-amounts → gemma_extraction_service → gemma_client.complete_json()</text>

  <!-- 4b -->
  <rect x="110" y="458" width="760" height="45" rx="6" fill="#FDEBD0" stroke="#E67E22" stroke-width="1.5" />
  <text x="120" y="475" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="12" font-weight="bold" fill="#D35400">4b. _SYSTEM_PROMPT (gemma_verification_service.py L16)</text>
  <rect x="500" y="463" width="65" height="18" rx="3" fill="#E67E22" />
  <text x="532" y="476" text-anchor="middle" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="9" font-weight="bold" fill="white">temp=0.1</text>
