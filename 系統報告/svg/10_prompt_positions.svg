  <!-- Title -->
  <text x="600" y="35" text-anchor="middle" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="22" font-weight="bold" fill="#333">Prompt Positions in Communication Chain</text>
  <text x="600" y="56" text-anchor="middle" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="13" fill="#777">每個 Prompt 在單次使用者互動中的位置與執行順序</text>

  <!-- Legend -->
