  <text x="510" y="688" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="13" font-weight="bold" fill="#1E8449">6b. PROMPT_STRUCTURED_EXTRACT</text>
  <rect x="780" y="676" width="65" height="18" rx="3" fill="#27AE60" />
  <text x="812" y="689" text-anchor="middle" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="9" font-weight="bold" fill="white">temp=0.1</text>
  <text x="510" y="705" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="10" fill="#555">advisor.py L305 → _extract_structured_data()</text>
  <text x="510" y="720" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="10" fill="#888">→ _call_gemma()</text>

  <!-- Parallel bracket -->
  <text x="490" y="697" text-anchor="middle" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="16" fill="#27AE60">||</text>
  <text x="490" y="715" text-anchor="middle" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="9" fill="#888">parallel</text>

  <line x1="890" y1="700" x2="918" y2="87" stroke="#27AE60" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowhead-green)" />

