  <!-- Timeline arrow at top -->
  <text x="60" y="118" text-anchor="middle" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="11" fill="#999">START</text>

  <!-- ================================================================ -->
  <!-- STEP 1: PROMPT_ECHO -->
  <!-- ================================================================ -->
  <circle cx="60" cy="148" r="16" fill="#4A90D9" />
  <text x="60" y="153" text-anchor="middle" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="13" font-weight="bold" fill="white">1</text>

  <rect x="90" y="128" width="800" height="58" rx="8" fill="#D6EAF8" stroke="#4A90D9" stroke-width="2" filter="url(#shadow)" />
  <text x="100" y="148" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="14" font-weight="bold" fill="#2C6FAC">PROMPT_ECHO (advisor.py L43)</text>
  <rect x="450" y="136" width="65" height="20" rx="4" fill="#4A90D9" />
  <text x="482" y="150" text-anchor="middle" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="10" font-weight="bold" fill="white">temp=0.0</text>
  <text x="100" y="165" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="11" fill="#555">Position: advisor.py → _step_echo() → _call_gemma()</text>
  <text x="100" y="180" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="11" fill="#888">使用者訊息進入 — 回聲確認</text>

  <!-- Arrow to LLM -->
  <line x1="890" y1="148" x2="918" y2="87" stroke="#4A90D9" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowhead-blue)" />

  <!-- ================================================================ -->
  <!-- STEP 2: PROMPT_PHASE1 + system_manual.md -->
  <!-- ================================================================ -->
  <circle cx="60" cy="228" r="16" fill="#4A90D9" />
  <text x="60" y="233" text-anchor="middle" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="13" font-weight="bold" fill="white">2</text>

  <rect x="90" y="205" width="800" height="68" rx="8" fill="#D6EAF8" stroke="#4A90D9" stroke-width="2" filter="url(#shadow)" />
  <text x="100" y="225" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="14" font-weight="bold" fill="#2C6FAC">PROMPT_PHASE1 (advisor.py L84) + system_manual.md (548 lines)</text>
  <rect x="620" y="213" width="65" height="20" rx="4" fill="#4A90D9" />
  <text x="652" y="227" text-anchor="middle" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="10" font-weight="bold" fill="white">temp=0.3</text>
  <text x="100" y="243" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="11" fill="#555">Position: advisor.py → _step_phase1() → _call_gemma()</text>
  <text x="100" y="258" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="11" fill="#888">意圖判斷 + 工具選擇 — narrative_memory 注入於此</text>
  <text x="100" y="268" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="10" fill="#4A90D9">system_manual.md: 工具使用說明書 (548行，隨 system prompt 一起送入)</text>

  <line x1="890" y1="228" x2="918" y2="87" stroke="#4A90D9" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowhead-blue)" />

