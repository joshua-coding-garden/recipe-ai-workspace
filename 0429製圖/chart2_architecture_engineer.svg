<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" font-family="'Noto Sans TC','PingFang TC','Microsoft JhengHei',sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f2a3a"/>
    </marker>
    <marker id="arrDash" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#5c6b80"/>
    </marker>
  </defs>

  <rect width="1600" height="900" fill="#ffffff"/>

  <!-- 標題 -->
  <text x="60" y="62" font-size="32" font-weight="700" fill="#1f2a3a">Recipe-AI 程式架構（四層）</text>
  <text x="60" y="94" font-size="18" fill="#5c6b80">給工程人員參考 ── 模組化分層、技術傳遞、外部資源清單</text>

  <!-- ============ Layer 1：Frontend ============ -->
  <rect x="60" y="140" width="1040" height="140" rx="16" fill="#f4f7fb" stroke="#1f2a3a" stroke-width="2.5"/>
  <text x="80" y="172" font-size="22" font-weight="700" fill="#1f2a3a">① Frontend</text>
  <text x="240" y="172" font-size="18" fill="#5c6b80">React + Vite ── 瀏覽器端 SPA</text>

  <rect x="90"  y="195" width="225" height="70" rx="10" fill="#dbeaf7" stroke="#1f6fb8" stroke-width="2"/>
  <text x="202" y="225" font-size="17" font-weight="700" fill="#1f2a3a" text-anchor="middle">UnifiedAnalysis</text>
  <text x="202" y="250" font-size="15" fill="#5c6b80" text-anchor="middle">Page.jsx</text>

  <rect x="345" y="195" width="225" height="70" rx="10" fill="#d4ecde" stroke="#1f8a5b" stroke-width="2"/>
  <text x="457" y="225" font-size="17" font-weight="700" fill="#1f2a3a" text-anchor="middle">SymptomSearch</text>
  <text x="457" y="250" font-size="15" fill="#5c6b80" text-anchor="middle">Page.jsx</text>

  <rect x="600" y="195" width="225" height="70" rx="10" fill="#fbe6cc" stroke="#d97a25" stroke-width="2"/>
  <text x="712" y="225" font-size="17" font-weight="700" fill="#1f2a3a" text-anchor="middle">DriGap</text>
  <text x="712" y="250" font-size="15" fill="#5c6b80" text-anchor="middle">Page.jsx</text>

  <rect x="855" y="195" width="225" height="70" rx="10" fill="#e3e6eb" stroke="#5b6776" stroke-width="2"/>
  <text x="967" y="225" font-size="17" font-weight="700" fill="#1f2a3a" text-anchor="middle">Profile</text>
  <text x="967" y="250" font-size="15" fill="#5c6b80" text-anchor="middle">Page.jsx</text>

  <!-- 連線 1: Frontend → Control -->
  <line x1="580" y1="284" x2="580" y2="316" stroke="#1f2a3a" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="600" y="307" font-size="15" font-weight="600" fill="#5c6b80">HTTP / JSON</text>

  <!-- ============ Layer 2：Control ============ -->
  <rect x="60" y="320" width="1040" height="140" rx="16" fill="#f4f7fb" stroke="#1f2a3a" stroke-width="2.5"/>
  <text x="80" y="352" font-size="22" font-weight="700" fill="#1f2a3a">② Control Service</text>
  <text x="318" y="352" font-size="18" fill="#5c6b80">FastAPI ── 路由 + 業務邏輯（Router + Service）</text>

  <rect x="90"  y="375" width="225" height="70" rx="10" fill="#dbeaf7" stroke="#1f6fb8" stroke-width="2"/>
  <text x="202" y="400" font-size="16" font-weight="700" fill="#1f2a3a" text-anchor="middle">recipe router</text>
  <text x="202" y="424" font-size="14" fill="#1f2a3a" text-anchor="middle">reverse_search · ai_service</text>

  <rect x="345" y="375" width="225" height="70" rx="10" fill="#d4ecde" stroke="#1f8a5b" stroke-width="2"/>
  <text x="457" y="402" font-size="16" font-weight="700" fill="#1f2a3a" text-anchor="middle">health router</text>
  <text x="457" y="428" font-size="15" fill="#1f2a3a" text-anchor="middle">symptom_service</text>

  <rect x="600" y="375" width="225" height="70" rx="10" fill="#fbe6cc" stroke="#d97a25" stroke-width="2"/>
  <text x="712" y="402" font-size="16" font-weight="700" fill="#1f2a3a" text-anchor="middle">dri router</text>
  <text x="712" y="428" font-size="15" fill="#1f2a3a" text-anchor="middle">dri_gap_service</text>

  <rect x="855" y="375" width="225" height="70" rx="10" fill="#e3e6eb" stroke="#5b6776" stroke-width="2"/>
  <text x="967" y="402" font-size="16" font-weight="700" fill="#1f2a3a" text-anchor="middle">profile router</text>
  <text x="967" y="428" font-size="14" fill="#1f2a3a" text-anchor="middle">直接呼叫 user_repository</text>

  <!-- 連線 2: Control → Backend -->
  <line x1="580" y1="464" x2="580" y2="496" stroke="#1f2a3a" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="600" y="487" font-size="15" font-weight="600" fill="#5c6b80">內部 HTTP</text>

  <!-- ============ Layer 3：Backend ============ -->
  <rect x="60" y="500" width="1040" height="140" rx="16" fill="#f4f7fb" stroke="#1f2a3a" stroke-width="2.5"/>
  <text x="80" y="532" font-size="22" font-weight="700" fill="#1f2a3a">③ Backend Service</text>
  <text x="335" y="532" font-size="18" fill="#5c6b80">FastAPI ── 資料存取（Repositories + 比對策略）</text>

  <rect x="90"  y="555" width="305" height="70" rx="10" fill="#dbeaf7" stroke="#1f6fb8" stroke-width="2"/>
  <text x="242" y="585" font-size="17" font-weight="700" fill="#1f2a3a" text-anchor="middle">food_repository</text>
  <text x="242" y="610" font-size="15" fill="#5c6b80" text-anchor="middle">taiwan_foods + foodb 食品檢索</text>

  <rect x="425" y="555" width="305" height="70" rx="10" fill="#d4ecde" stroke="#1f8a5b" stroke-width="2"/>
  <text x="577" y="585" font-size="17" font-weight="700" fill="#1f2a3a" text-anchor="middle">health_repository</text>
  <text x="577" y="610" font-size="15" fill="#5c6b80" text-anchor="middle">健康效果 / 化合物 / Top Foods</text>

  <rect x="760" y="555" width="320" height="70" rx="10" fill="#e3e6eb" stroke="#5b6776" stroke-width="2"/>
  <text x="920" y="585" font-size="17" font-weight="700" fill="#1f2a3a" text-anchor="middle">user_repository</text>
  <text x="920" y="610" font-size="15" fill="#5c6b80" text-anchor="middle">比對策略：精確 → ILIKE → trigram</text>

  <!-- 連線 3: Backend → Database -->
  <line x1="580" y1="644" x2="580" y2="676" stroke="#1f2a3a" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="600" y="667" font-size="15" font-weight="600" fill="#5c6b80">SQL</text>

  <!-- ============ Layer 4：Database ============ -->
  <rect x="60" y="680" width="1040" height="140" rx="16" fill="#f4f7fb" stroke="#1f2a3a" stroke-width="2.5"/>
  <text x="80" y="712" font-size="22" font-weight="700" fill="#1f2a3a">④ Database</text>
  <text x="240" y="712" font-size="18" fill="#5c6b80">PostgreSQL ── 主要資料表</text>

  <rect x="90"  y="735" width="305" height="70" rx="10" fill="#ffffff" stroke="#1f2a3a" stroke-width="2"/>
  <text x="242" y="765" font-size="17" font-weight="700" fill="#1f2a3a" text-anchor="middle">taiwan_foods</text>
  <text x="242" y="790" font-size="14" fill="#5c6b80" text-anchor="middle">台灣食品成分</text>

  <rect x="425" y="735" width="305" height="70" rx="10" fill="#ffffff" stroke="#1f2a3a" stroke-width="2"/>
  <text x="577" y="765" font-size="17" font-weight="700" fill="#1f2a3a" text-anchor="middle">foodb_*</text>
  <text x="577" y="790" font-size="14" fill="#5c6b80" text-anchor="middle">食品 / 化合物 / 健康效果 / contents</text>

  <rect x="760" y="735" width="320" height="70" rx="10" fill="#ffffff" stroke="#1f2a3a" stroke-width="2"/>
  <text x="920" y="765" font-size="17" font-weight="700" fill="#1f2a3a" text-anchor="middle">profiles</text>
  <text x="920" y="790" font-size="14" fill="#5c6b80" text-anchor="middle">使用者個人資料</text>

  <!-- ============ 右側：JSON 資源 + 設計原則 ============ -->
  <text x="1340" y="170" font-size="22" font-weight="700" fill="#1f2a3a" text-anchor="middle">外部資源（JSON 設定）</text>

  <rect x="1140" y="195" width="400" height="80" rx="12" fill="#fff8e7" stroke="#d97a25" stroke-width="2"/>
  <text x="1340" y="226" font-size="18" font-weight="700" fill="#1f2a3a" text-anchor="middle">nutrient_field_map.json</text>
  <text x="1340" y="252" font-size="15" fill="#5c6b80" text-anchor="middle">營養欄位白名單 + 跨 DB 對照</text>

  <rect x="1140" y="290" width="400" height="80" rx="12" fill="#fff8e7" stroke="#d97a25" stroke-width="2"/>
  <text x="1340" y="321" font-size="18" font-weight="700" fill="#1f2a3a" text-anchor="middle">symptom_mapping.json</text>
  <text x="1340" y="347" font-size="15" fill="#5c6b80" text-anchor="middle">症狀 → effect 名稱對照</text>

  <rect x="1140" y="385" width="400" height="80" rx="12" fill="#fff8e7" stroke="#d97a25" stroke-width="2"/>
  <text x="1340" y="416" font-size="18" font-weight="700" fill="#1f2a3a" text-anchor="middle">hpa_dri_v8.json</text>
  <text x="1340" y="442" font-size="15" fill="#5c6b80" text-anchor="middle">DRI 欄位定義與目標值</text>

  <!-- JSON 資源被 Control / Backend 載入（標籤註記） -->
  <text x="1340" y="478" font-size="14" fill="#5c6b80" text-anchor="middle">↑ 由 Control / Backend 啟動時載入</text>

  <!-- 設計原則框 -->
  <rect x="1140" y="495" width="400" height="180" rx="12" fill="#eef3fa" stroke="#1f6fb8" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="1340" y="528" font-size="20" font-weight="700" fill="#1f6fb8" text-anchor="middle">系統設計原則</text>

  <text x="1160" y="560" font-size="15" fill="#1f2a3a">• 規則提取：jieba 斷詞 + 停用詞</text>
  <text x="1160" y="585" font-size="15" fill="#1f2a3a">• 檢索聚合：精確 → ILIKE → trigram</text>
  <text x="1160" y="610" font-size="15" fill="#1f2a3a">• 跨 DB 聚合：taiwan_foods × foodb_*</text>
  <text x="1160" y="635" font-size="15" fill="#1f2a3a">• Direct Match → 斷詞 → 後端檢索</text>
  <text x="1160" y="660" font-size="15" font-weight="700" fill="#d97a25">• 不使用模型推論</text>

  <!-- 底部說明 -->
  <text x="800" y="868" font-size="15" fill="#5c6b80" text-anchor="middle">※ 全部技術棧：React + Vite (Frontend) ｜ FastAPI × 2 (Control / Backend) ｜ PostgreSQL ｜ JSON 設定資源；可由原始碼直接驗證</text>
</svg>
