<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 750" width="1300" height="750">
  <defs>
    <marker id="arrow06" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <linearGradient id="headerGrad06" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <filter id="shadow06" x="-3%" y="-3%" width="106%" height="106%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1300" height="750" rx="12" fill="#F8F9FC"/>

  <!-- Title -->
  <rect x="0" y="0" width="1300" height="56" rx="12" fill="url(#headerGrad06)"/>
  <rect x="0" y="30" width="1300" height="26" fill="url(#headerGrad06)"/>
  <text x="650" y="38" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="24" font-weight="bold" fill="white" text-anchor="middle">v3 認知重建引擎（CRE）</text>

  <!-- ===== INPUT BOX ===== -->
  <rect x="30" y="80" width="240" height="160" rx="10" fill="#EEF2FF" stroke="#6366F1" stroke-width="2" filter="url(#shadow06)"/>
  <rect x="30" y="80" width="240" height="36" rx="10" fill="#6366F1"/>
  <rect x="30" y="106" width="240" height="10" fill="#6366F1"/>
  <text x="150" y="104" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">輸入來源</text>
  <text x="50" y="140" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="13" fill="#312E81">1. 使用者訊息</text>
  <text x="50" y="163" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="13" fill="#312E81">2. AI 回覆</text>
  <text x="50" y="186" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="13" fill="#312E81">3. 工具執行結果</text>
  <text x="50" y="209" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="13" fill="#312E81">4. 歷史 facts（查重用）</text>

  <!-- Arrow Input → Regex -->
  <line x1="270" y1="160" x2="310" y2="160" stroke="#555" stroke-width="2" marker-end="url(#arrow06)"/>

  <!-- ===== 8 REGEX PATTERNS ===== -->
  <rect x="315" y="72" width="370" height="290" rx="10" fill="#FFF7ED" stroke="#F59E0B" stroke-width="2" filter="url(#shadow06)"/>
  <rect x="315" y="72" width="370" height="36" rx="10" fill="#F59E0B"/>
  <rect x="315" y="98" width="370" height="10" fill="#F59E0B"/>
  <text x="500" y="96" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">8 個正規表達式模式</text>

  <text x="335" y="130" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="12" fill="#92400E" font-weight="bold">_AGE_RE</text>
  <text x="430" y="130" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="11" fill="#78350F">r"(\d{1,3})\s*歲"</text>

  <text x="335" y="155" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="12" fill="#92400E" font-weight="bold">_GENDER_RE</text>
  <text x="430" y="155" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="11" fill="#78350F">r"(男|女|男性|女性)"</text>

  <text x="335" y="180" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="12" fill="#92400E" font-weight="bold">_ALLERGY_RE</text>
  <text x="430" y="180" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="11" fill="#78350F">r"(對|我).*(過敏|不能吃)"</text>

  <text x="335" y="205" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="12" fill="#92400E" font-weight="bold">_DIET_KW</text>
  <text x="430" y="205" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="11" fill="#78350F">素食/低醣/生酮/減脂...</text>

  <text x="335" y="230" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="12" fill="#92400E" font-weight="bold">_WEIGHT_RE</text>
  <text x="430" y="230" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="11" fill="#78350F">r"(\d+\.?\d*)\s*(公斤|kg)"</text>

  <text x="335" y="255" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="12" fill="#92400E" font-weight="bold">_HEIGHT_RE</text>
  <text x="430" y="255" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="11" fill="#78350F">r"(\d+\.?\d*)\s*(公分|cm)"</text>

  <text x="335" y="280" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="12" fill="#92400E" font-weight="bold">_PREGNANT_RE</text>
  <text x="430" y="280" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="11" fill="#78350F">r"懷孕|孕婦|哺乳"</text>

  <text x="335" y="305" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="12" fill="#92400E" font-weight="bold">_DISEASE_RE</text>
  <text x="430" y="305" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="11" fill="#78350F">r"糖尿病|高血壓|腎臟..."</text>

  <text x="500" y="350" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="11" fill="#B45309" text-anchor="middle" font-style="italic">純 Rule-based，無 LLM 呼叫</text>

  <!-- Arrow Regex → Output -->
  <line x1="685" y1="210" x2="720" y2="210" stroke="#555" stroke-width="2" marker-end="url(#arrow06)"/>

  <!-- ===== OUTPUT: FACT TRIPLES ===== -->
  <rect x="725" y="80" width="280" height="155" rx="10" fill="#ECFDF5" stroke="#10B981" stroke-width="2" filter="url(#shadow06)"/>
  <rect x="725" y="80" width="280" height="36" rx="10" fill="#10B981"/>
  <rect x="725" y="106" width="280" height="10" fill="#10B981"/>
  <text x="865" y="104" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">輸出：Fact Triples</text>
  <text x="745" y="138" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="12" fill="#065F46" font-weight="bold">[{</text>
  <text x="760" y="156" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="11" fill="#065F46">subject: str,</text>
  <text x="760" y="174" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="11" fill="#065F46">predicate: str,</text>
  <text x="760" y="192" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="11" fill="#065F46">object: str,</text>
  <text x="760" y="210" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="11" fill="#065F46">confidence: float</text>
  <text x="745" y="228" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="12" fill="#065F46" font-weight="bold">}, ...]</text>

  <!-- Arrow Output → reconstruct -->
  <line x1="865" y1="235" x2="865" y2="275" stroke="#555" stroke-width="2" marker-end="url(#arrow06)"/>

  <!-- ===== reconstruct_context() ===== -->
  <rect x="725" y="280" width="280" height="90" rx="10" fill="#F0F9FF" stroke="#0EA5E9" stroke-width="2" filter="url(#shadow06)"/>
  <text x="865" y="310" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="13" font-weight="bold" fill="#0C4A6E" text-anchor="middle">reconstruct_context()</text>
  <text x="745" y="333" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="11" fill="#0C4A6E">facts → 依 confidence 排序</text>
  <text x="745" y="353" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="11" fill="#0C4A6E">→ token budget 裁切 → context str</text>

  <!-- Arrow reconstruct → DB -->
  <line x1="865" y1="370" x2="865" y2="400" stroke="#555" stroke-width="2" marker-end="url(#arrow06)"/>

  <!-- ===== STORAGE: DB TABLE ===== -->
  <rect x="725" y="405" width="540" height="155" rx="10" fill="#FFF1F2" stroke="#E11D48" stroke-width="2" filter="url(#shadow06)"/>
  <rect x="725" y="405" width="540" height="36" rx="10" fill="#E11D48"/>
  <rect x="725" y="431" width="540" height="10" fill="#E11D48"/>
  <text x="995" y="429" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">DB: cognitive_facts</text>

  <!-- Table header -->
  <rect x="745" y="455" width="100" height="28" rx="4" fill="#FBE6E9"/>
  <rect x="855" y="455" width="100" height="28" rx="4" fill="#FBE6E9"/>
  <rect x="965" y="455" width="90" height="28" rx="4" fill="#FBE6E9"/>
  <rect x="1065" y="455" width="80" height="28" rx="4" fill="#FBE6E9"/>
  <rect x="1155" y="455" width="95" height="28" rx="4" fill="#FBE6E9"/>
  <text x="795" y="474" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="11" font-weight="bold" fill="#9F1239" text-anchor="middle">subject</text>
  <text x="905" y="474" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="11" font-weight="bold" fill="#9F1239" text-anchor="middle">predicate</text>
  <text x="1010" y="474" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="11" font-weight="bold" fill="#9F1239" text-anchor="middle">object</text>
  <text x="1105" y="474" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="11" font-weight="bold" fill="#9F1239" text-anchor="middle">confidence</text>
  <text x="1202" y="474" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="11" font-weight="bold" fill="#9F1239" text-anchor="middle">superseded_by</text>

  <!-- Table data -->
  <text x="795" y="505" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="11" fill="#881337" text-anchor="middle">使用者</text>
  <text x="905" y="505" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="11" fill="#881337" text-anchor="middle">年齡</text>
  <text x="1010" y="505" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="11" fill="#881337" text-anchor="middle">25</text>
  <text x="1105" y="505" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="11" fill="#881337" text-anchor="middle">1.0</text>
  <text x="1202" y="505" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="11" fill="#881337" text-anchor="middle">NULL</text>

  <text x="795" y="528" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="11" fill="#881337" text-anchor="middle">使用者</text>
  <text x="905" y="528" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="11" fill="#881337" text-anchor="middle">過敏</text>
  <text x="1010" y="528" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="11" fill="#881337" text-anchor="middle">花生</text>
  <text x="1105" y="528" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="11" fill="#881337" text-anchor="middle">0.9</text>
  <text x="1202" y="528" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="11" fill="#881337" text-anchor="middle">NULL</text>

  <text x="995" y="550" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="10" fill="#9F1239" text-anchor="middle" font-style="italic">新值覆寫舊值時 superseded_by 指向新 row ID</text>

  <!-- ===== EXAMPLE BOX ===== -->
  <rect x="30" y="400" width="660" height="160" rx="10" fill="#FFFBEB" stroke="#F59E0B" stroke-width="2" filter="url(#shadow06)"/>
  <rect x="30" y="400" width="660" height="36" rx="10" fill="#D97706"/>
  <rect x="30" y="426" width="660" height="10" fill="#D97706"/>
  <text x="360" y="424" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">範例：「我是25歲男性，對花生過敏」</text>

  <text x="50" y="465" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="13" fill="#78350F" font-weight="bold">_AGE_RE 匹配</text>
  <text x="200" y="465" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="12" fill="#92400E">→  (使用者, 年齡, 25, confidence=1.0)</text>

  <text x="50" y="495" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="13" fill="#78350F" font-weight="bold">_GENDER_RE 匹配</text>
  <text x="200" y="495" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="12" fill="#92400E">→  (使用者, 性別, 男, confidence=1.0)</text>

  <text x="50" y="525" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="13" fill="#78350F" font-weight="bold">_ALLERGY_RE 匹配</text>
  <text x="200" y="525" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="12" fill="#92400E">→  (使用者, 過敏, 花生, confidence=0.9)</text>

  <text x="50" y="548" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="10" fill="#B45309" font-style="italic">confidence &lt; 1.0：regex 無法 100% 確定「花生」是過敏原而非偏好</text>

  <!-- ===== FLOW ANNOTATION ===== -->
  <rect x="30" y="585" width="1240" height="60" rx="8" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="650" y="612" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="13" fill="#5B21B6" text-anchor="middle" font-weight="bold">流程：每輪對話結束 → extract_facts() 掃描新訊息 → 比對已存 facts（相同 subject+predicate 則 supersede 舊值）→ 寫入 cognitive_facts → reconstruct_context() 產出下次 system prompt 補充段</text>

  <!-- ===== KEY DESIGN NOTE ===== -->
  <rect x="30" y="665" width="1240" height="60" rx="8" fill="#F0F9FF" stroke="#0EA5E9" stroke-width="1.5"/>
  <text x="650" y="688" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="13" fill="#0C4A6E" text-anchor="middle" font-weight="bold">設計要點：CRE 全程 Rule-based（零 LLM 呼叫），確保延遲 &lt;5ms、成本為零。Confidence 閾值可調（預設 0.5 以上才進 context）。</text>
  <text x="650" y="710" font-family="Microsoft JhengHei, Arial, sans-serif" font-size="12" fill="#0C4A6E" text-anchor="middle">superseded_by 鏈結構讓「使用者說新年齡」自動取代舊值，不需手動清理</text>
</svg>